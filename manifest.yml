modules:
  jira:issueActivity:
    - key: dynatrace-insights-for-jira-activity-panel
      resource: main
      resolver:
        function: resolver
      title: Dynatrace Insights for JIRA
  jira:adminPage:
    - key: dynatrace-insight-hub-config-panel
      name: Dynatrace Connector for Jira
      resource: config
      resolver:
        function: resolver
      title: Dynatrace Connector for Jira - config
      icon: https://developer.atlassian.com/platform/forge/images/settings-icon.svg
      layout: basic
      useAsConfig: true
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: static/activity-panel/build
  - key: config
    path: static/config-panel/build
permissions:
  scopes:
    - read:jira-work
    - write:jira-work
    - storage:app
  external:
    fetch:
      backend:
        - address: "*.dynatrace.com"
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/58261551-fbcb-4ea4-832b-2ba3076ef74b
